services:
  - type: web
    name: vericlaim-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: HF_REPO
        value: Indeebar/VeriClaim_models
      - key: PYTHON_VERSION
        value: 3.11.0